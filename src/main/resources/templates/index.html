<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOG Carport-forespørgsel</title>
    <link href="../public/css/styles.css" th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>

<div class="main-container">

    <header class="header-section">
        <div class="logo-box">Fog</div>
        <h1 class="main-title">Fog Carport-forespørgsel</h1>
    </header>

    <form class="content-layout" action="#" method="POST">

        <aside class="sidebar-form">

            <div class="form-group">
                <span class="form-label-box">VÆLG BREDDE</span>
                <select class="form-control" name="width">
                    <option value="">Vælg bredde...</option>

                </select>
            </div>

            <div class="form-group">
                <span class="form-label-box">VÆLG LÆNGDE</span>
                <select class="form-control" name="length">
                    <option value="">Vælg længde...</option>

                </select>
            </div>

            <div class="form-group">
                <span class="form-label-box">VÆLG TAG</span>
                <div class="radio-group">
                    <label class="option-inline">
                        <input type="radio" name="roof_type" value="fladt"> Fladt tag
                    </label>
                    <label class="option-inline">
                        <input type="radio" name="roof_type" value="rejsning"> Tag med rejsning
                    </label>
                </div>
            </div>

            <div class="form-group">
                <span class="form-label-box">TILVALG AF SKUR</span>
                <div class="checkbox-group">
                    <label class="option-inline">
                        <input type="checkbox" name="has_shed" value="ja"> Ja, jeg ønsker skur
                    </label>
                </div>
            </div>

            <div class="form-group">
                <span class="form-label-box">VÆLG BREDDE (SKUR)</span>
                <select class="form-control" name="shed_width">
                    <option value="">Vælg bredde...</option>

                </select>
            </div>

            <div class="form-group">
                <span class="form-label-box">VÆLG LÆNGDE (SKUR)</span>
                <select class="form-control" name="shed_length">
                    <option value="">Vælg længde...</option>

                </select>
            </div>

            <div class="form-group">
                <span class="form-label-box">INDTAST OPLYSNINGER</span>
                <input type="fornavn" class="form-control" placeholder="Dit fornavn" required>
                <input type="efternavn" class="form-control" placeholder="Dit efternavn" required>
                <input type="adresse" class="form-control" placeholder="Din adresse" required>
                <input type="email" class="form-control" placeholder="Din e-mailadresse" required>
            </div>

        </aside>

        <section class="image-gallery">
            <img th:src="@{/images/carport_med_skur.jpg}" src="../public/images/carport_med_skur.jpg" alt="Carport model 1" class="gallery-image">
            <img th:src="@{/images/carport_uden_skur.jpg}" src="../public/images/carport_uden_skur.jpg" alt="Carport model 2" class="gallery-image">
        </section>

    </form>

    <footer class="button-container">
        <button type="submit" class="btn-submit">Send Forespørgsel</button>
    </footer>

</div>

</body>
</html>

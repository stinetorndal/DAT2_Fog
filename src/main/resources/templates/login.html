<!--  INDHOLD PÅ DENNE SIDE:   -->

<!-- Denne side indeholder login til sælger.

-->
<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sælger-login</title>
    <link href="../public/css/styles.css" th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>

<div class="main-container">

    <header class="header-section" th:fragment="fog-header">
        <div class="logo-box">Fog</div>
        <h1 class="main-title">Login</h1>
    </header>

    <form class="sales-dashboard-btn-container" method="post" action="/login" th:action="@{/login}">

        <div class="form-group login-box-width">
            <span class="form-label-box">Indtast e-mail</span>
            <input type="email" name="email" class="form-control" placeholder="Indtast e-mail" required="required"/>
        </div>

        <div class="form-group login-box-width">
            <span class="form-label-box">Indtast password</span>
            <input type="password" name="password" class="form-control" placeholder="Indtast password" required="required"/>
        </div>

        <div th:if="${message != null}" class="login-box-width">
            <span class="form-label-box" th:text="${message}">Fejlbesked</span>
        </div>

        <div class="button-container-2">
            <button type="submit" class="sales-dashboard-large">Login</button>
        </div>

    </form>

</div>
</body>
</html>
